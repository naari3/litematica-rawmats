name: Publish Release

# GitHub で Release を publish すると走る。tag (例 v0.1.0) を付けて Release を作成すること。
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Gradle and loom
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
            .gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Read mod_version from gradle.properties
        id: props
        run: |
          v=$(sed -n 's/^[[:space:]]*mod_version[[:space:]]*=[[:space:]]*//p' gradle.properties)
          echo "mod_version=$v" >> "$GITHUB_OUTPUT"
          echo "mod_version: $v"

      - name: Find the built jar (exclude sources)
        id: jar
        run: |
          f=$(find build/libs -name 'rawmats-fabric-*.jar' ! -name '*-sources.jar' | head -n1)
          echo "file=$f" >> "$GITHUB_OUTPUT"
          echo "jar: $f"

      # Modrinth / CurseForge / GitHub Release へ publish。
      # modrinth-id・curseforge-id は fabric.mod.json の custom.mc-publish から、
      # dependencies (malilib, litematica) は depends から自動取得。
      - name: Publish to Modrinth, CurseForge and GitHub
        uses: Kira-NT/mc-publish@v3
        with:
          name: Litematica RawMaterials ${{ github.event.release.tag_name }}
          version: ${{ steps.props.outputs.mod_version }}
          version-type: ${{ github.event.release.prerelease && 'beta' || 'release' }}
          changelog: ${{ github.event.release.body }}

          game-versions: "26.2"
          loaders: fabric
          java: "25"

          files: ${{ steps.jar.outputs.file }}

          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
